<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Guideon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#0a0a0f;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#1a0533,#0d1f4d);padding:14px 16px;display:flex;align-items:center;gap:10px}
.logo{font-size:28px}.hi h1{font-size:18px;color:#c084fc;font-weight:700}.hi p{font-size:11px;color:#7c6fa0}
.hb{margin-left:auto;display:flex;gap:8px;align-items:center}
.st{display:flex;align-items:center;gap:5px;font-size:11px;color:#4ade80}
.sd{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.ib{background:none;border:none;color:#a78bfa;font-size:18px;cursor:pointer}
.pl{display:flex;gap:8px;padding:8px 14px;background:#0f0f1a;overflow-x:auto}
.pb{background:#1a1a2e;border:1px solid #2a2a4a;color:#a78bfa;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:8px;max-width:88%;animation:fi 0.3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{margin-left:auto;flex-direction:row-reverse}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.av.g{background:linear-gradient(135deg,#4c1d95,#1e3a8a)}
.av.u{background:linear-gradient(135deg,#065f46,#1e3a8a)}
.mc{display:flex;flex-direction:column;gap:4px;max-width:100%}
.mt{font-size:10px;color:#4a4a6a}.msg.user .mt{text-align:right}
.bub{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.g .bub{background:linear-gradient(135deg,#1a0533,#0d1f4d);border:1px solid #2d1b69;border-radius:4px 18px 18px 18px;color:#e0e0ff}
.msg.user .bub{background:linear-gradient(135deg,#065f46,#0d4f86);border-radius:18px 4px 18px 18px;color:#fff}
.ba{display:flex;gap:6px;margin-top:4px}
.cb{background:none;border:none;color:#6a6a8a;font-size:12px;cursor:pointer;padding:2px 6px;border-radius:6px}
.ty{display:flex;gap:5px;padding:12px 16px;background:#1a0533;border:1px solid #2d1b69;border-radius:4px 18px 18px 18px;width:fit-content}
.ty span{width:7px;height:7px;background:#a78bfa;border-radius:50%;animation:bo 1.2s infinite}
.ty span:nth-child(2){animation-delay:0.2s}.ty span:nth-child(3){animation-delay:0.4s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.ia{padding:12px 14px;background:#0f0f1a;border-top:1px solid #1a1a2e;display:flex;gap:8px;align-items:flex-end}
#ui{flex:1;background:#1a1a2e;border:1px solid #2a2a4a;color:#e0e0e0;padding:10px 14px;border-radius:22px;font-size:14px;resize:none;outline:none;max-height:120px;font-family:inherit}
#ui:focus{border-color:#7c3aed}#ui::placeholder{color:#4a4a6a}
.sb{background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;color:white;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mb{background:#1a1a2e;border:1px solid #2a2a4a;color:#a78bfa;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mb.on{background:#7c3aed}
.wl{text-align:center;padding:40px 20px;color:#4a4a6a}
.wl .big{font-size:48px;margin-bottom:10px}
.wl h2{color:#7c6fa0;font-size:18px;margin-bottom:6px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center}
.mo.show{display:flex}
.mb2{background:#1a1a2e;border:1px solid #2d1b69;border-radius:16px;padding:28px;width:85%;max-width:320px;text-align:center}
.mb2 h2{color:#c084fc;margin-bottom:8px}.mb2 p{color:#7c6fa0;font-size:13px;margin-bottom:16px}
.mb2 input{width:100%;background:#0a0a0f;border:1px solid #2d1b69;color:#e0e0e0;padding:10px 14px;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px}
.mb2 button{width:100%;background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;color:#fff;padding:10px;border-radius:10px;font-size:14px;cursor:pointer}
.er{color:#f87171;font-size:12px;margin-bottom:8px;display:none}
</style>
</head>
<body>
<div class="mo" id="lm">
<div class="mb2">
<div style="font-size:40px;margin-bottom:10px">🧠</div>
<h2>Guideon</h2><p>Entrez le mot de passe</p>
<input type="password" id="pi" placeholder="Mot de passe..." onkeydown="if(event.key==='Enter')cp()">
<div class="er" id="pe">Mot de passe incorrect</div>
<button onclick="cp()">Entrer</button>
</div></div>
<header>
<div class="logo">🧠</div>
<div class="hi"><h1>Guideon</h1><p>Assistant sage et philosophique</p></div>
<div class="hb">
<div class="st"><div class="sd"></div><span>En ligne</span></div>
<button class="ib" onclick="tvv()" id="vt">🔊</button>
</div></header>
<div class="pl">
<button class="pb" onclick="up('/traduire ')">🌍 Traduire</button>
<button class="pb" onclick="up('/resume ')">📝 Resumer</button>
<button class="pb" onclick="up('/image ')">🎨 Image</button>
<button class="pb" onclick="up('!web ')">🌐 Web</button>
<button class="pb" onclick="cc()">🗑️ Effacer</button>
</div>
<div id="chat">
<div class="wl"><div class="big">🧠</div><h2>Bonjour ! Je suis votre assistant virtuel Guideon</h2><p>Que puis-je faire pour vous ?</p></div>
</div>
<div class="ia">
<textarea id="ui" placeholder="Ecrivez votre message..." rows="1"></textarea>
<button class="mb" id="mb" onclick="tm()">🎤</button>
<button class="sb" onclick="sm()">➤</button>
</div>
<script>
const PW="guideon2024";
let history=[],ve=false,rec=null,il=false;
function cp(){const p=document.getElementById('pi').value;if(p===PW){document.getElementById('lm').classList.remove('show');}else{document.getElementById('pe').style.display='block';}}
function tvv(){ve=!ve;document.getElementById('vt').textContent=ve?'🔊':'🔇';}
function sp(t){if(!ve)return;const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=0.9;speechSynthesis.speak(u);}
function tm(){if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){alert('Micro non supporte.');return;}if(il){rec.stop();return;}rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();rec.lang='fr-FR';rec.onstart=()=>{il=true;document.getElementById('mb').classList.add('on');};rec.onresult=(e)=>{document.getElementById('ui').value=e.results[0][0].transcript;};rec.onend=()=>{il=false;document.getElementById('mb').classList.remove('on');};rec.start();}
function up(p){const i=document.getElementById('ui');i.value=p;i.focus();}
function cc(){history=[];document.getElementById('chat').innerHTML='<div class="wl"><div class="big">🧠</div><h2>Nouvelle conversation</h2><p>Que puis-je faire ?</p></div>';}
function gt(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function am(role,content,img=null){const chat=document.getElementById('chat');const wl=chat.querySelector('.wl');if(wl)wl.remove();const d=document.createElement('div');d.className='msg '+(role==='guideon'?'g':'user');const av=role==='guideon'?'🧠':'👤';const ac=role==='guideon'?'g':'u';const t=content.replace(/\n/g,'<br>');const ih=img?'<br><img src="'+img+'" style="max-width:220px;border-radius:12px;margin-top:8px">':'';const ah=role==='guideon'?'<div class="ba"><button class="cb" onclick="navigator.clipboard.writeText(this.closest(\'.mc\').querySelector(\'.bub\').innerText)">Copier</button></div>':'';d.innerHTML='<div class="av '+ac+'">'+av+'</div><div class="mc"><div class="bub">'+t+ih+'</div>'+ah+'<div class="mt">'+gt()+'</div></div>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}
function sty(){const chat=document.getElementById('chat');const d=document.createElement('div');d.className='msg g';d.id='ty';d.innerHTML='<div class="av g">🧠</div><div class="ty"><span></span><span></span><span></span></div>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}
function rty(){const t=document.getElementById('ty');if(t)t.remove();}
async function sm(){const i=document.getElementById('ui');const msg=i.value.trim();if(!msg)return;i.value='';i.style.height='auto';am('user',msg);sty();try{if(msg.startsWith('/image ')){const p=msg.substring(7);const r=await fetch('/api/image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p})});const d=await r.json();rty();am('guideon','Voici votre image !',d.url);return;}if(msg.startsWith('!web ')){const q=msg.substring(5);const sr=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});const sd=await sr.json();const fm=sd.result?'[Info: '+sd.result+']\n\n'+q:q;const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:fm,history})});const d=await r.json();rty();history.push({role:'user',content:fm});history.push({role:'assistant',content:d.reply});am('guideon',d.reply);sp(d.reply);return;}const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,history})});const d=await r.json();rty();if(d.reply){history.push({role:'user',content:msg});history.push({role:'assistant',content:d.reply});am('guideon',d.reply);sp(d.reply);}}catch(e){rty();am('guideon','Erreur: '+e.message);}}
document.getElementById('ui').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sm();}});
document.getElementById('ui').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
</script>
</body>
</html>
