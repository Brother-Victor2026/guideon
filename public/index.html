<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Guideon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#0a0a0f;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#1a0533,#0d1f4d);padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2a2a4a}
.logo{font-size:28px}.hi h1{font-size:18px;color:#c084fc;font-weight:700}.hi p{font-size:11px;color:#7c6fa0}
.hb{margin-left:auto;display:flex;gap:8px;align-items:center}
.st{display:flex;align-items:center;gap:5px;font-size:11px;color:#4ade80}
.sd{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.ib{background:none;border:none;color:#a78bfa;font-size:18px;cursor:pointer;padding:4px}
.pl{display:flex;gap:8px;padding:8px 14px;background:#0f0f1a;overflow-x:auto;scrollbar-width:none}
.pb{background:#1a1a2e;border:1px solid #2a2a4a;color:#a78bfa;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:8px;max-width:88%;animation:fi 0.3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{margin-left:auto;flex-direction:row-reverse}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.av.g{background:linear-gradient(135deg,#4c1d95,#1e3a8a)}
.av.u{background:linear-gradient(135deg,#065f46,#1e3a8a)}
.mc{display:flex;flex-direction:column;gap:4px;max-width:100%}
.mt{font-size:10px;color:#4a4a6a}.msg.user .mt{text-align:right}
.bub{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.g .bub{background:linear-gradient(135deg,#1a0533,#0d1f4d);border:1px solid #2d1b69;border-radius:4px 18px 18px 18px;color:#e0e0ff}
.msg.user .bub{background:linear-gradient(135deg,#065f46,#0d4f86);border-radius:18px 4px 18px 18px;color:#fff}
.ba{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.cb{background:none;border:none;color:#6a6a8a;font-size:11px;cursor:pointer;padding:2px 8px;border-radius:6px;border:1px solid #2a2a4a}
.cb:hover{background:#2d1b69;color:#a78bfa}
pre{background:#0d0d1a;border:1px solid #2a2a4a;border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;position:relative}
code{font-family:monospace;font-size:13px;color:#a78bfa}
.code-copy{position:absolute;top:8px;right:8px;background:#2d1b69;border:none;color:#a78bfa;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer}
.msg img{max-width:220px;border-radius:12px;margin-top:8px;display:block}
.img-dl{background:#2d1b69;border:none;color:#a78bfa;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;margin-top:4px}
.ty{display:flex;gap:5px;padding:12px 16px;background:#1a0533;border:1px solid #2d1b69;border-radius:4px 18px 18px 18px;width:fit-content}
.ty span{width:7px;height:7px;background:#a78bfa;border-radius:50%;animation:bo 1.2s infinite}
.ty span:nth-child(2){animation-delay:0.2s}.ty span:nth-child(3){animation-delay:0.4s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.ia{padding:12px 14px;background:#0f0f1a;border-top:1px solid #1a1a2e;display:flex;gap:8px;align-items:flex-end}
#ui{flex:1;background:#1a1a2e;border:1px solid #2a2a4a;color:#e0e0e0;padding:10px 14px;border-radius:22px;font-size:14px;resize:none;outline:none;max-height:120px;font-family:inherit}
#ui:focus{border-color:#7c3aed}#ui::placeholder{color:#4a4a6a}
.sb{background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;color:white;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mib{background:#1a1a2e;border:1px solid #2a2a4a;color:#a78bfa;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mib.on{background:#7c3aed}
.wl{text-align:center;padding:40px 20px;color:#4a4a6a}
.wl .big{font-size:48px;margin-bottom:10px}
.wl h2{color:#7c6fa0;font-size:18px;margin-bottom:6px}
.edit-input{background:#0a0a0f;border:1px solid #7c3aed;color:#e0e0e0;padding:6px 10px;border-radius:8px;font-size:14px;width:100%;font-family:inherit}
</style>
</head>
<body>
<header>
<div class="logo">🧠</div>
<div class="hi"><h1>Guideon</h1><p id="greet">Bonjour !</p></div>
<div class="hb">
<div class="st"><div class="sd"></div><span>En ligne</span></div>
<button class="ib" onclick="tvv()" id="vt">🔊</button>
<button class="ib" onclick="cc()">🗑️</button>
</div></header>
<div class="pl">
<button class="pb" onclick="up('/traduire ')">🌍 Traduire</button>
<button class="pb" onclick="up('/resume ')">📝 Resumer</button>
<button class="pb" onclick="up('/image ')">🎨 Image</button>
<button class="pb" onclick="up('!web ')">🌐 Web</button>
</div>
<div id="chat">
<div class="wl"><div class="big">🧠</div><h2 id="wlmsg">Bonjour !</h2><p>Que puis-je faire pour vous ?</p></div>
</div>
<div class="ia">
<textarea id="ui" placeholder="Ecrivez votre message..." rows="1"></textarea>
<button class="mib" id="mb" onclick="tm()">🎤</button>
<button class="sb" onclick="sm()">➤</button>
</div>
<script>
let chatHistory=JSON.parse(localStorage.getItem('guideon_hist')||'[]');
let ve=false,rec=null,il=false;

function getGreeting(){
  const h=new Date().getHours();
  if(h>=5&&h<12)return'Bonjour !';
  if(h>=12&&h<17)return'Bon après-midi !';
  if(h>=17&&h<21)return'Bonsoir !';
  return'Bonne nuit !';
}

window.onload=function(){
  const g=getGreeting();
  document.getElementById('greet').textContent=g;
  document.getElementById('wlmsg').textContent=g;
};

function tvv(){ve=!ve;document.getElementById('vt').textContent=ve?'🔊':'🔇';}
function sp(t){if(!ve)return;const u=new SpeechSynthesisUtterance(t.replace(/<[^>]*>/g,''));u.lang='fr-FR';u.rate=0.9;speechSynthesis.speak(u);}

function tm(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){alert('Micro non supporte.');return;}
  if(il){rec.stop();return;}
  rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang='fr-FR';
  rec.onstart=()=>{il=true;document.getElementById('mb').classList.add('on');};
  rec.onresult=(e)=>{document.getElementById('ui').value=e.results[0][0].transcript;};
  rec.onend=()=>{il=false;document.getElementById('mb').classList.remove('on');};
  rec.start();
}

function up(p){const i=document.getElementById('ui');i.value=p;i.focus();}

function cc(){
  chatHistory=[];
  localStorage.removeItem('guideon_hist');
  const g=getGreeting();
  document.getElementById('chat').innerHTML='<div class="wl"><div class="big">🧠</div><h2>'+g+'</h2><p>Que puis-je faire pour vous ?</p></div>';
}

function gt(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

function formatMsg(t){
  t=t.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){
    const id='code'+Math.random().toString(36).substr(2,6);
    return'<pre><code id="'+id+'">'+code.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code><button class="code-copy" onclick="navigator.clipboard.writeText(document.getElementById(\''+id+'\').innerText)">Copier</button></pre>';
  });
  t=t.replace(/\n/g,'<br>');
  return t;
}

function am(role,content,img=null){
  const chat=document.getElementById('chat');
  const wl=chat.querySelector('.wl');if(wl)wl.remove();
  const d=document.createElement('div');
  d.className='msg '+(role==='guideon'?'g':'user');
  const av=role==='guideon'?'🧠':'👤';
  const ac=role==='guideon'?'g':'u';
  const t=formatMsg(content);
  let imgHtml='';
  if(img){
    imgHtml='<br><img src="'+img+'" alt="Image"><br><button class="img-dl" onclick="dlImg(\''+img+'\')">⬇️ Enregistrer</button>';
  }
  let actions='';
  if(role==='guideon'){
    actions='<div class="ba"><button class="cb" onclick="copyMsg(this)">📋 Copier</button></div>';
  } else {
    actions='<div class="ba"><button class="cb" onclick="editMsg(this)">✏️ Modifier</button></div>';
  }
  d.innerHTML='<div class="av '+ac+'">'+av+'</div><div class="mc"><div class="bub">'+t+imgHtml+'</div>'+actions+'<div class="mt">'+gt()+'</div></div>';
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function copyMsg(btn){
  const txt=btn.closest('.mc').querySelector('.bub').innerText;
  navigator.clipboard.writeText(txt);
  btn.textContent='✅ Copié!';
  setTimeout(()=>btn.textContent='📋 Copier',2000);
}

function dlImg(url){
  const a=document.createElement('a');
  a.href=url;a.download='guideon-image.jpg';a.target='_blank';a.click();
}

function editMsg(btn){
  const bub=btn.closest('.mc').querySelector('.bub');
  const old=bub.innerText;
  bub.innerHTML='<input class="edit-input" value="'+old+'">';
  btn.textContent='✅ Sauver';
  btn.onclick=function(){
    const newVal=bub.querySelector('input').value;
    bub.innerHTML=newVal;
    btn.textContent='✏️ Modifier';
    btn.onclick=function(){editMsg(btn);};
  };
}

function sty(){
  const chat=document.getElementById('chat');
  const d=document.createElement('div');d.className='msg g';d.id='ty';
  d.innerHTML='<div class="av g">🧠</div><div class="ty"><span></span><span></span><span></span></div>';
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}

function rty(){const t=document.getElementById('ty');if(t)t.remove();}

    if(msg.startsWith('/image ')){
      const p=msg.substring(7);
      const r=await fetch('/api/image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p})});
